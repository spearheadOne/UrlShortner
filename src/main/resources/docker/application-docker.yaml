ktor:
  application:
    modules:
      - org.abondar.experimental.urlshortner.ApplicationKt.module
  deployment:
    port: 8080

  redis:
    url: "$REDIS_URL"
    db: "$REDIS_DB"
    password: "$REDIS_PASS"

  cassandra:
    contactPoints: "$CASSANDRA_CONTACT_POINTS"
    localDatacenter: "$CASSANDRA_DATACENTER"

  urlshortner:
    defaultTtlSeconds: 86400
    snowflake:
      retryCount: 5
      url: "$SNOWFLAKE_HOST/snowflake"